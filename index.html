<!DOCTYPE html>

<html>
    <head>
        <title>MapOS</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="top-bar">
            <p style="margin-left: 16px; font-weight: 700;">
                MapOS
            </p>
            <p id="timeElement" style="margin-right: 16px;">
                Date Time
            </p>
        </div>
        
        <div id="welcome">
            <div id="welcomeheader">
                <p style="margin: 0px; color: black; font-weight: 600;">Welcome</p>
            </div>
            <div class="window-content">
                <img style="width: 64px; height: 64px; border-radius: 50%; border: 1px solid black; object-fit: cover;" src="train.png"/>
                <h1 style="margin: 4px;">MapOS</h1>
                <p style="margin: 4px;">Travel your desktop on a train!</p>
            </div>
        </div>

        <script>
            function updateTime() {
                var currentTime = new Date().toLocaleString();
                var timeText = document.querySelector("#timeElement");
                timeText.innerHTML = currentTime;
            }
            setInterval(updateTime, 1000);
        </script>

        <script src="script.js"></script>
    </body>

</html>
